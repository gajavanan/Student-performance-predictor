<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Student Performance Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-bg"></div>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <i class="fas fa-key"></i>
                <h2>Reset Password</h2>
                <p>Enter your email to receive reset instructions</p>
            </div>
            <div id="errorAlert" class="alert alert-danger"></div>
            <div id="successAlert" class="alert alert-success"></div>
            <form id="forgotForm">
                <div class="mb-3">
                    <label class="form-label text-muted small fw-medium">Email Address</label>
                    <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                </div>
                <button type="submit" class="btn-primary-custom" id="resetBtn">
                    <span id="resetBtnText">Send Reset Link</span>
                    <span id="resetSpinner" class="spinner" style="display:none;"></span>
                </button>
            </form>
            <div class="auth-footer">
                <p class="mb-0 text-muted">
                    Remember your password? <a href="login.html">Sign in</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('resetBtn');
            const btnText = document.getElementById('resetBtnText');
            const spinner = document.getElementById('resetSpinner');
            const errorAlert = document.getElementById('errorAlert');
            const successAlert = document.getElementById('successAlert');

            btn.disabled = true;
            btnText.textContent = 'Sending...';
            spinner.style.display = 'inline-block';
            errorAlert.style.display = 'none';
            successAlert.style.display = 'none';

            try {
                const res = await fetch(`${API_URL}/api/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: document.getElementById('email').value.trim() })
                });
                const data = await res.json();
                if (res.ok) {
                    successAlert.textContent = data.message || 'Reset email sent. Check your inbox.';
                    successAlert.style.display = 'block';
                } else {
                    errorAlert.textContent = data.error || 'Failed to send reset email';
                    errorAlert.style.display = 'block';
                }
            } catch (err) {
                errorAlert.textContent = 'Connection error.';
                errorAlert.style.display = 'block';
            } finally {
                btn.disabled = false;
                btnText.textContent = 'Send Reset Link';
                spinner.style.display = 'none';
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
