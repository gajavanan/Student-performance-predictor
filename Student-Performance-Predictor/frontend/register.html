<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Student Performance Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-bg"></div>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <i class="fas fa-user-plus"></i>
                <h2>Create Account</h2>
                <p>Join the Student Performance Predictor</p>
            </div>
            <div id="errorAlert" class="alert alert-danger"></div>
            <div id="successAlert" class="alert alert-success"></div>
            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label text-muted small fw-semibold">Full Name</label>
                    <input type="text" class="form-control" id="name" placeholder="John Doe" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted small fw-semibold">Email Address</label>
                    <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted small fw-semibold">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="Min. 6 characters" required minlength="6">
                    <div class="form-text small">Must be at least 6 characters</div>
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted small fw-semibold">Confirm Password</label>
                    <input type="password" class="form-control" id="confirmPassword" placeholder="Repeat password" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted small fw-semibold">Role</label>
                    <select class="form-select" id="role">
                        <option value="faculty">Faculty</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="terms" required>
                    <label class="form-check-label small text-muted" for="terms">
                        I agree to the <a href="#" class="text-decoration-none">Terms of Service</a> and <a href="#" class="text-decoration-none">Privacy Policy</a>
                    </label>
                </div>
                <button type="submit" class="btn-primary-custom" id="registerBtn">
                    <span id="registerBtnText">Create Account</span>
                    <span id="registerSpinner" class="spinner" style="display:none;"></span>
                </button>
            </form>
            <div class="auth-footer">
                <p class="mb-0 text-muted">
                    Already have an account? <a href="login.html">Sign in</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const errorAlert = document.getElementById('errorAlert');
            const successAlert = document.getElementById('successAlert');
            const btn = document.getElementById('registerBtn');
            const btnText = document.getElementById('registerBtnText');
            const spinner = document.getElementById('registerSpinner');

            if (password !== confirm) {
                errorAlert.textContent = 'Passwords do not match';
                errorAlert.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btnText.textContent = 'Creating account...';
            spinner.style.display = 'inline-block';
            errorAlert.style.display = 'none';
            successAlert.style.display = 'none';

            try {
                const res = await fetch(`${API_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({
                        name: document.getElementById('name').value.trim(),
                        email: document.getElementById('email').value.trim(),
                        password: password,
                        role: document.getElementById('role').value
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    successAlert.textContent = 'Account created! Redirecting...';
                    successAlert.style.display = 'block';
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
                } else {
                    errorAlert.textContent = data.error || 'Registration failed';
                    errorAlert.style.display = 'block';
                }
            } catch (err) {
                errorAlert.textContent = 'Connection error. Please try again.';
                errorAlert.style.display = 'block';
            } finally {
                btn.disabled = false;
                btnText.textContent = 'Create Account';
                spinner.style.display = 'none';
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
