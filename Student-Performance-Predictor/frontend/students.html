<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students - Student Performance Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header"><h3><i class="fas fa-graduation-cap"></i> SPP</h3><small class="text-muted">Performance Predictor</small></div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i class="fas fa-th-large"></i> Dashboard</a>
                <a href="students.html" class="nav-item active"><i class="fas fa-users"></i> Students</a>
                <a href="prediction.html" class="nav-item"><i class="fas fa-robot"></i> Predictions</a>
                <a href="analytics.html" class="nav-item"><i class="fas fa-chart-bar"></i> Analytics</a>
                <a href="reports.html" class="nav-item"><i class="fas fa-file-alt"></i> Reports</a>
            </nav>
            <div class="sidebar-footer">
                <div class="d-flex align-items-center gap-2">
                    <div class="user-avatar" id="sidebarAvatar">U</div>
                    <div><div class="fw-semibold small" id="sidebarName">User</div><div class="small text-muted" id="sidebarRole">Faculty</div></div>
                    <button class="btn btn-sm text-danger ms-auto" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
        </aside>
        <main class="main-content">
            <div class="topbar">
                <div class="topbar-left">
                    <button class="mobile-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                    <h4>Students</h4>
                </div>
                <div class="topbar-right">
                    <button class="btn-icon" onclick="toggleTheme()"><i class="fas fa-moon" id="themeIcon"></i></button>
                    <div class="user-avatar" id="topbarAvatar">U</div>
                </div>
            </div>

            <div class="table-container">
                <div class="table-header">
                    <h5><i class="fas fa-users me-2 text-primary"></i>All Students</h5>
                    <div class="d-flex gap-2 flex-wrap">
                        <input type="text" class="form-control form-control-sm" placeholder="Search..." id="studentSearch" onkeyup="loadStudents()" style="width:200px;">
                        <button class="btn btn-primary btn-sm" onclick="showAddStudentModal()"><i class="fas fa-plus"></i> Add Student</button>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Student ID</th>
                                <th>Name</th>
                                <th>Department</th>
                                <th>Semester</th>
                                <th>Attendance</th>
                                <th>Study Hrs</th>
                                <th>Assignment</th>
                                <th>Internal</th>
                                <th>Previous</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="studentsTableBody">
                            <tr><td colspan="10" class="text-center text-muted py-4">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
                <div class="pagination" id="studentsPagination"></div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Student Modal -->
    <div class="modal fade" id="studentModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="studentModalTitle"><i class="fas fa-user-graduate me-2 text-primary"></i>Add Student</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="studentForm">
                        <input type="hidden" id="editStudentId">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label small">Student ID</label>
                                <input type="text" class="form-control" id="sId" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small">Name</label>
                                <input type="text" class="form-control" id="sName" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small">Department</label>
                                <select class="form-select" id="sDept">
                                    <option>Computer Science</option>
                                    <option>Information Technology</option>
                                    <option>Electronics</option>
                                    <option>Mechanical</option>
                                    <option>Civil</option>
                                    <option>Electrical</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small">Semester</label>
                                <select class="form-select" id="sSem"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option></select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small">Age</label>
                                <input type="number" class="form-control" id="sAge" min="16" max="30">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small">Gender</label>
                                <select class="form-select" id="sGender"><option>Male</option><option>Female</option><option>Other</option></select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small">Attendance (%)</label>
                                <input type="number" class="form-control" id="sAttendance" min="0" max="100" step="0.1">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small">Study Hours/Day</label>
                                <input type="number" class="form-control" id="sStudy" min="0" max="24" step="0.1">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small">Assignment Score</label>
                                <input type="number" class="form-control" id="sAssignment" min="0" max="100" step="0.1">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small">Internal Marks</label>
                                <input type="number" class="form-control" id="sInternal" min="0" max="100" step="0.1">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small">Previous Marks</label>
                                <input type="number" class="form-control" id="sPrevious" min="0" max="100" step="0.1">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary" onclick="saveStudent()"><i class="fas fa-save me-1"></i> Save</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="notifContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/students.js"></script>
</body>
</html>
