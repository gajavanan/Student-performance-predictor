<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Student Performance Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-bg"></div>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <i class="fas fa-graduation-cap"></i>
                <h2>Welcome Back</h2>
                <p>Sign in to your account</p>
            </div>
            <div id="errorAlert" class="alert alert-danger"></div>
            <div id="successAlert" class="alert alert-success"></div>
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label text-muted small fw-medium">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                        <input type="email" class="form-control border-start-0" id="email" placeholder="name@example.com" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted small fw-medium">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0"><i class="fas fa-lock text-muted"></i></span>
                        <input type="password" class="form-control border-start-0 border-end-0" id="password" placeholder="Enter your password" required>
                        <span class="input-group-text bg-transparent border-start-0" style="cursor:pointer;" onclick="togglePassword()">
                            <i class="fas fa-eye text-muted" id="toggleIcon"></i>
                        </span>
                    </div>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="remember">
                        <label class="form-check-label small text-muted" for="remember">Remember me</label>
                    </div>
                    <a href="forgot-password.html" class="small text-decoration-none" style="color: var(--primary);">Forgot password?</a>
                </div>
                <button type="submit" class="btn-primary-custom" id="loginBtn">
                    <span id="loginBtnText">Sign In</span>
                    <span id="loginSpinner" class="spinner" style="display:none;"></span>
                </button>
            </form>
            <div class="auth-footer">
                <p class="mb-0 text-muted small">
                    Don't have an account? <a href="register.html">Create one</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;

        function togglePassword() {
            const pwd = document.getElementById('password');
            const icon = document.getElementById('toggleIcon');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.className = 'fas fa-eye-slash text-muted';
            } else {
                pwd.type = 'password';
                icon.className = 'fas fa-eye text-muted';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('loginBtnText');
            const spinner = document.getElementById('loginSpinner');
            const errorAlert = document.getElementById('errorAlert');
            const successAlert = document.getElementById('successAlert');

            btn.disabled = true;
            btnText.textContent = 'Signing in...';
            spinner.style.display = 'inline-block';
            errorAlert.style.display = 'none';
            successAlert.style.display = 'none';

            try {
                const res = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({
                        email: document.getElementById('email').value.trim(),
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    successAlert.textContent = 'Login successful! Redirecting...';
                    successAlert.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 800);
                } else {
                    errorAlert.textContent = data.error || 'Login failed';
                    errorAlert.style.display = 'block';
                }
            } catch (err) {
                errorAlert.textContent = 'Connection error. Please try again.';
                errorAlert.style.display = 'block';
            } finally {
                btn.disabled = false;
                btnText.textContent = 'Sign In';
                spinner.style.display = 'none';
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
