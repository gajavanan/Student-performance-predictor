<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictions - Student Performance Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header"><h3><i class="fas fa-graduation-cap"></i> SPP</h3><small class="text-muted">Performance Predictor</small></div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i class="fas fa-th-large"></i> Dashboard</a>
                <a href="students.html" class="nav-item"><i class="fas fa-users"></i> Students</a>
                <a href="prediction.html" class="nav-item active"><i class="fas fa-robot"></i> Predictions</a>
                <a href="analytics.html" class="nav-item"><i class="fas fa-chart-bar"></i> Analytics</a>
                <a href="reports.html" class="nav-item"><i class="fas fa-file-alt"></i> Reports</a>
            </nav>
            <div class="sidebar-footer">
                <div class="d-flex align-items-center gap-2">
                    <div class="user-avatar" id="sidebarAvatar">U</div>
                    <div><div class="fw-semibold small" id="sidebarName">User</div><div class="small text-muted" id="sidebarRole">Faculty</div></div>
                    <button class="btn btn-sm text-danger ms-auto" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
        </aside>
        <main class="main-content">
            <div class="topbar">
                <div class="topbar-left">
                    <button class="mobile-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                    <h4>Predictions</h4>
                </div>
                <div class="topbar-right">
                    <button class="btn-icon" onclick="toggleTheme()"><i class="fas fa-moon" id="themeIcon"></i></button>
                    <div class="user-avatar" id="topbarAvatar">U</div>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-lg-5">
                    <div class="chart-container">
                        <h5 class="mb-4"><i class="fas fa-magic me-2 text-primary"></i>Predict Performance</h5>
                        <form id="predictionForm">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label small">Student ID</label>
                                    <input type="text" class="form-control" id="predStudentId" placeholder="e.g. S001">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small">Student Name</label>
                                    <input type="text" class="form-control" id="predStudentName" placeholder="John Doe">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small">Department</label>
                                    <select class="form-select" id="predDept">
                                        <option>Computer Science</option>
                                        <option>Information Technology</option>
                                        <option>Electronics</option>
                                        <option>Mechanical</option>
                                        <option>Civil</option>
                                        <option>Electrical</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small">Semester</label>
                                    <select class="form-select" id="predSem"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option></select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small">Attendance (%)</label>
                                    <input type="number" class="form-control" id="predAttendance" min="0" max="100" step="0.1" value="85">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small">Study Hours/Day</label>
                                    <input type="number" class="form-control" id="predStudy" min="0" max="24" step="0.1" value="4">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small">Assignment Score</label>
                                    <input type="number" class="form-control" id="predAssign" min="0" max="100" step="0.1" value="80">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small">Internal Marks</label>
                                    <input type="number" class="form-control" id="predInternal" min="0" max="100" step="0.1" value="75">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small">Previous Semester Marks</label>
                                    <input type="number" class="form-control" id="predPrevious" min="0" max="100" step="0.1" value="70">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small">Algorithm</label>
                                    <select class="form-select" id="predAlgo">
                                        <option>Random Forest</option>
                                        <option>Linear Regression</option>
                                        <option>Decision Tree</option>
                                    </select>
                                </div>
                                <div class="col-12 mt-3">
                                    <button type="submit" class="btn btn-primary w-100 py-2">
                                        <i class="fas fa-calculator me-2"></i> Predict Performance
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
                <div class="col-lg-7">
                    <div class="chart-container" id="resultContainer" style="display:none;">
                        <h5 class="mb-4"><i class="fas fa-chart-bar me-2 text-success"></i>Prediction Result</h5>
                        <div class="prediction-result" id="predictionResult"></div>
                        <div id="insightsContainer" class="mt-3"></div>
                    </div>
                    <div class="chart-container mt-3">
                        <h5 class="mb-3"><i class="fas fa-history me-2 text-info"></i>Recent Predictions</h5>
                        <div id="recentPredsList">
                            <p class="text-muted small">No predictions yet.</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Prediction History -->
            <div class="table-container mt-4">
                <div class="table-header">
                    <h5><i class="fas fa-list me-2 text-primary"></i>Prediction History</h5>
                    <div class="d-flex gap-2 flex-wrap">
                        <input type="text" class="form-control form-control-sm" placeholder="Search..." id="predHistSearch" onkeyup="loadPredictionHistory()" style="width:180px;">
                        <select class="form-select form-select-sm" id="filterDepartment" onchange="loadPredictionHistory()" style="width:150px;">
                            <option value="">All Departments</option>
                            <option>Computer Science</option>
                            <option>Information Technology</option>
                            <option>Electronics</option>
                            <option>Mechanical</option>
                            <option>Civil</option>
                            <option>Electrical</option>
                        </select>
                        <select class="form-select form-select-sm" id="filterPerformance" onchange="loadPredictionHistory()" style="width:150px;">
                            <option value="">All Levels</option>
                            <option>Excellent</option>
                            <option>Good</option>
                            <option>Average</option>
                            <option>Poor</option>
                        </select>
                        <button class="btn btn-outline-primary btn-sm" onclick="exportPredictions()"><i class="fas fa-download"></i> Export</button>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Student</th>
                                <th>Department</th>
                                <th>Predicted</th>
                                <th>Grade</th>
                                <th>Performance</th>
                                <th>Risk</th>
                                <th>Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="predHistoryBody">
                            <tr><td colspan="8" class="text-center text-muted py-4">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
                <div class="pagination" id="predPagination"></div>
            </div>
        </main>
    </div>

    <div class="toast-container" id="notifContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/prediction.js"></script>
</body>
</html>
